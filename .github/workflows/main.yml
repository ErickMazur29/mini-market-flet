name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet==0.28.3

      - name: Set UTF-8 code page
        run: chcp 65001
        shell: cmd

      - name: Build executable
        run: flet build windows
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"

      - name: Zip build output
        run: powershell Compress-Archive -Path build/windows/* -DestinationPath mercado-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mercado-windows
          path: mercado-windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mercado-windows.zip
